
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#wrap {
  width: 100%;
  padding: 12px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  font-family: var(--font-sans);
}
#hud {
  width: 100%;
  max-width: 480px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.hud-card {
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 8px 12px;
  text-align: center;
}
.hud-label { font-size: 11px; color: var(--color-text-secondary); font-weight: 500; letter-spacing: 0.04em; }
.hud-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-top: 1px; }
canvas#c {
  border-radius: var(--border-radius-lg);
  border: 0.5px solid var(--color-border-tertiary);
  background: #0a1628;
  display: block;
  touch-action: none;
}
#msg-overlay {
  width: 480px;
  max-width: 100%;
  border-radius: var(--border-radius-lg);
  border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  padding: 24px 28px;
  text-align: center;
}
#msg-title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
#msg-sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 20px; line-height: 1.6; }
#msg-btn {
  background: #3B6D11;
  color: #EAF3DE;
  border: none;
  border-radius: var(--border-radius-md);
  padding: 10px 28px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font-sans);
}
#msg-btn:hover { background: #27500A; }
#ctrl-hint {
  font-size: 12px;
  color: var(--color-text-tertiary);
  text-align: center;
  max-width: 480px;
}
</style>

<div id="wrap">
  <div id="hud">
    <div class="hud-card"><div class="hud-label">⚡ Energía</div><div class="hud-val" id="h-score">0</div></div>
    <div class="hud-card"><div class="hud-label">🌊 Nivel</div><div class="hud-val" id="h-level">1</div></div>
    <div class="hud-card"><div class="hud-label">🔋 Vidas</div><div class="hud-val" id="h-lives">3</div></div>
  </div>

  <canvas id="c" width="480" height="500"></canvas>

  <div id="msg-overlay">
    <div id="msg-title">☀️ Solar Defender</div>
    <div id="msg-sub">Eres un rayo de sol. Destruye las nubes de carbono antes de que oscurezcan los paneles solares.<br><br>Mueve con el mouse o toca la pantalla. Dispara automáticamente.</div>
    <button id="msg-btn" onclick="startGame()">Iniciar juego</button>
  </div>

  <div id="ctrl-hint">Mueve el cursor sobre el canvas para apuntar · el rayo dispara solo</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 500;

let state = 'menu';
let score = 0, lives = 3, level = 1;
let player, bullets, enemies, particles, stars;
let frame = 0, spawnTimer = 0, fireTimer = 0;
let raf;

const COLORS = {
  player: '#EF9F27',
  bullet: '#FAC775',
  cloud: '#888780',
  co2: '#E24B4A',
  wind: '#378ADD',
  hydro: '#1D9E75',
  particle: '#C0DD97',
};

function randBetween(a, b) { return a + Math.random() * (b - a); }

function initStars() {
  stars = Array.from({length: 40}, () => ({
    x: Math.random() * W,
    y: Math.random() * H * 0.6,
    r: Math.random() * 1.5 + 0.5,
    a: Math.random() * 0.6 + 0.4
  }));
}

function initGame() {
  score = 0; lives = 3; level = 1; frame = 0; spawnTimer = 0; fireTimer = 0;
  player = { x: W / 2, y: H - 60, w: 36, h: 36, tx: W / 2 };
  bullets = [];
  enemies = [];
  particles = [];
  initStars();
  updateHUD();
}

function startGame() {
  document.getElementById('msg-overlay').style.display = 'none';
  initGame();
  state = 'playing';
  loop();
}

function updateHUD() {
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-level').textContent = level;
  document.getElementById('h-lives').textContent = '❤️'.repeat(lives);
}

function spawnEnemy() {
  const types = ['cloud', 'co2', 'cloud', 'cloud'];
  if (level >= 3) types.push('wind');
  if (level >= 5) types.push('co2', 'co2');
  const type = types[Math.floor(Math.random() * types.length)];
  const hp = type === 'co2' ? 2 : 1;
  const sp = randBetween(0.6, 1.0 + level * 0.15);
  enemies.push({
    x: randBetween(30, W - 30),
    y: -30,
    w: type === 'co2' ? 34 : 44,
    h: type === 'co2' ? 26 : 22,
    vx: randBetween(-0.5, 0.5),
    vy: sp,
    type,
    hp,
    maxHp: hp,
    flash: 0
  });
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = randBetween(1, 3.5);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: randBetween(0.025, 0.06),
      r: randBetween(2, 5),
      color
    });
  }
}

function fireBullet() {
  bullets.push({ x: player.x, y: player.y - 20, vy: -7, w: 5, h: 12 });
}

function loop() {
  if (state !== 'playing') return;
  frame++;
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

function update() {
  player.x += (player.tx - player.x) * 0.12;
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));

  fireTimer++;
  const fireRate = Math.max(12, 20 - level);
  if (fireTimer >= fireRate) { fireBullet(); fireTimer = 0; }

  bullets.forEach(b => b.y += b.vy);
  bullets = bullets.filter(b => b.y > -20);

  spawnTimer++;
  const spawnRate = Math.max(35, 80 - level * 6);
  if (spawnTimer >= spawnRate) { spawnEnemy(); spawnTimer = 0; }

  enemies.forEach(e => {
    e.y += e.vy;
    e.x += e.vx;
    if (e.x < e.w / 2 || e.x > W - e.w / 2) e.vx *= -1;
    if (e.flash > 0) e.flash--;
  });

  bullets.forEach(b => {
    enemies.forEach(e => {
      if (!e.dead && Math.abs(b.x - e.x) < (b.w / 2 + e.w / 2) && Math.abs(b.y - e.y) < (b.h / 2 + e.h / 2)) {
        e.hp--;
        e.flash = 5;
        b.dead = true;
        if (e.hp <= 0) {
          e.dead = true;
          score += e.type === 'co2' ? 20 : 10;
          spawnParticles(e.x, e.y, e.type === 'co2' ? COLORS.co2 : COLORS.particle, 8);
          updateHUD();
          const newLevel = Math.floor(score / 150) + 1;
          if (newLevel > level) { level = newLevel; updateHUD(); }
        }
      }
    });
  });
  bullets = bullets.filter(b => !b.dead);

  const hitEnemies = enemies.filter(e => !e.dead && e.y > H - 10);
  hitEnemies.forEach(e => {
    e.dead = true;
    lives--;
    spawnParticles(e.x, H - 20, '#E24B4A', 6);
    updateHUD();
  });
  enemies = enemies.filter(e => !e.dead && e.y < H + 40);

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);

  if (lives <= 0) { gameOver(); }
}

function drawCloud(x, y, w, h, color, alpha) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(x, y, w / 2, h / 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x - w * 0.2, y + h * 0.1, w * 0.32, h * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + w * 0.2, y + h * 0.1, w * 0.32, h * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawSun(x, y, r) {
  ctx.fillStyle = COLORS.player;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = COLORS.bullet;
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 + frame * 0.02;
    ctx.beginPath();
    ctx.moveTo(x + Math.cos(angle) * (r + 3), y + Math.sin(angle) * (r + 3));
    ctx.lineTo(x + Math.cos(angle) * (r + 10), y + Math.sin(angle) * (r + 10));
    ctx.stroke();
  }
}

function drawPanel(x, y) {
  const pw = 80, ph = 10, gap = 3;
  for (let i = -1; i <= 1; i++) {
    ctx.fillStyle = i === 0 ? '#185FA5' : '#0C447C';
    ctx.fillRect(x - pw / 2 + i * (pw / 3 + gap / 2), y, pw / 3, ph);
    ctx.strokeStyle = '#042C53';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x - pw / 2 + i * (pw / 3 + gap / 2), y, pw / 3, ph);
  }
  ctx.fillStyle = '#5F5E5A';
  ctx.fillRect(x - 2, y + ph, 4, 16);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, W, H);

  stars.forEach(s => {
    ctx.globalAlpha = s.a * (0.7 + 0.3 * Math.sin(frame * 0.03 + s.x));
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#3B6D11';
  ctx.fillRect(0, H - 18, W, 18);
  ctx.fillStyle = '#27500A';
  ctx.fillRect(0, H - 20, W, 3);

  for (let i = 0; i < 4; i++) {
    drawPanel(60 + i * 120, H - 38);
  }

  enemies.forEach(e => {
    if (e.flash > 0) {
      ctx.globalAlpha = 0.4 + Math.random() * 0.3;
    }
    if (e.type === 'co2') {
      ctx.fillStyle = '#E24B4A';
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      drawCloud(e.x, e.y, e.w + 6, e.h + 6, '#791F1F', 0.95);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#FCEBEB';
      ctx.font = 'bold 11px monospace';
      ctx.fillText('CO₂', e.x, e.y);
    } else {
      drawCloud(e.x, e.y, e.w, e.h, e.flash > 0 ? '#ffffff' : '#888780', 0.88);
    }
    ctx.globalAlpha = 1;
    if (e.maxHp > 1) {
      const bw = 30, bh = 4;
      ctx.fillStyle = '#A32D2D';
      ctx.fillRect(e.x - bw / 2, e.y - e.h / 2 - 8, bw, bh);
      ctx.fillStyle = '#3B6D11';
      ctx.fillRect(e.x - bw / 2, e.y - e.h / 2 - 8, bw * (e.hp / e.maxHp), bh);
    }
  });

  bullets.forEach(b => {
    ctx.fillStyle = COLORS.bullet;
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.ellipse(b.x, b.y + 3, b.w / 4, b.h / 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  drawSun(player.x, player.y, 16);
}

function gameOver() {
  state = 'gameover';
  cancelAnimationFrame(raf);
  const ov = document.getElementById('msg-overlay');
  document.getElementById('msg-title').textContent = score >= 200 ? '⚡ ¡Ciudad verde!' : '☁️ Las nubes ganaron...';
  document.getElementById('msg-sub').textContent = `Energía capturada: ${score} MW\nNivel alcanzado: ${level}\n\n${score >= 200 ? '¡Protegiste los paneles solares! La ciudad tiene energía limpia.' : 'Las nubes de carbono bloquearon los paneles. ¡Inténtalo de nuevo!'}`;
  document.getElementById('msg-btn').textContent = 'Jugar de nuevo';
  ov.style.display = 'block';
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  player.tx = (e.clientX - rect.left) * scaleX;
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  player.tx = (e.touches[0].clientX - rect.left) * scaleX;
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  player.tx = (e.touches[0].clientX - rect.left) * scaleX;
}, { passive: false });
</script>
